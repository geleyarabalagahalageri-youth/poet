<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ಊರ ಕವನಗಳು</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{ --bg:#f3e4bf; --app:#faf6ed; --card:#f0ebe1; --text:#4b463f; --accent:#c9b37e; }
body{ margin:0; background:var(--bg); font-family:'Inter',sans-serif; color:var(--text); }
.app{ max-width:420px; margin:auto; min-height:100vh; background:var(--app); border-radius:28px; overflow:hidden; position: relative; }
header{ padding:18px; text-align:center; font-family:'Playfair Display',serif; font-size:22px; }
#status{ font-size: 10px; text-align: center; opacity: 0.5; margin-bottom: 10px; }
.card{ background:var(--card); margin:14px; padding:16px; border-radius:20px; box-shadow:0 6px 12px rgba(0,0,0,.05); cursor:pointer; }
.card p{ font-family:'Playfair Display',serif; line-height:1.6; margin:0; white-space: pre-wrap; }
.meta{ margin-top:10px; font-size:12px; opacity:.65; display:flex; justify-content:space-between; font-style:italic; }
.actions{ display:flex; justify-content:space-between; margin-top:10px; font-size:13px; opacity:.75; }
.add{ position:fixed; bottom:20px; right:20px; width:54px; height:54px; border-radius:50%; background:var(--accent); color:white; font-size:28px; display:none; align-items:center; justify-content:center; cursor: pointer; z-index: 100; }
.modal{ position:fixed; inset:0; background:rgba(0,0,0,.4); display:none; align-items:center; justify-content:center; z-index: 200; }
.box{ background:var(--app); width:90%; max-width:400px; border-radius:22px; padding:18px; position:relative; }
.close{ position:absolute; top:12px; right:14px; cursor:pointer; opacity:.6; }
.box input, .box textarea{ width:100%; border:1px solid #ddd; background:white; color:var(--text); margin-bottom:10px; padding: 8px; box-sizing: border-box; border-radius: 8px; }
.box textarea{ height:120px; }
.full{ display:none; padding:20px; }
.back{ opacity:.6; cursor:pointer; margin-bottom:10px; }
button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
</style>
</head>

<body>
<div class="app">
    <header><b>ಊರ್ಮನಿಯರ್‌ ಹಾಡ್</b></header>
    <div id="status">Connecting to database...</div>
    
    <div id="list"></div>

    <div class="full" id="full">
        <div class="back" onclick="closeFull()">← back</div>
        <div id="fullText"></div>
    </div>

    <div class="add" id="addBtn" onclick="openEditor()">＋</div>

    <div class="modal" id="editor">
        <div class="box">
            <div class="close" onclick="closeEditor()">✕</div>
            <input id="title" placeholder="Poem title">
            <textarea id="content" placeholder="Write your poem..."></textarea>
            <input id="author" placeholder="Author name">
            <button onclick="savePoem()">Save to Public Diary</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
// --- 1. PASTE YOUR CONFIG HERE ---
const firebaseConfig = {
  apiKey: "AIzaSyCNJX5mEmwBmd0uwh_Rjz8GyXczU3f6aA8",
  authDomain: "public-diary-dd4bc.firebaseapp.com",
  databaseURL:"https://public-diary-dd4bc-default-rtdb.firebaseio.com/",
  projectId: "public-diary-dd4bc",
  storageBucket: "public-diary-dd4bc.firebasestorage.app",
  messagingSenderId: "425689697738",
  appId: "1:425689697738:web:a1ad3211eb1089da395333",
  measurementId: "G-8SSNXL0SEQ"
};

// Initialize
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- 2. PERMISSIONS ---
// Set to 'true' to show Add/Delete buttons. Set to 'false' for the public version.
const IS_OWNER = true; 

if(IS_OWNER) { document.getElementById('addBtn').style.display = "flex"; }

let poemsArray = [];

// --- 3. FETCH DATA ---
db.ref("poems").on("value", (snapshot) => {
    document.getElementById("status").innerText = "Online";
    const data = snapshot.val();
    
    if(!data) {
        document.getElementById("list").innerHTML = "<p style='text-align:center; opacity:0.5;'>No entries yet.</p>";
        return;
    }

    // Convert object to array and sort by date
    poemsArray = Object.entries(data).map(([id, value]) => ({ id, ...value }));
    poemsArray.sort((a, b) => b.date - a.date); 
    
    render();
}, (error) => {
    document.getElementById("status").innerText = "Error: " + error.message;
});

function render() {
    const listDiv = document.getElementById("list");
    listDiv.innerHTML = "";
    
    poemsArray.forEach((p) => {
        listDiv.innerHTML += `
            <div class="card" onclick="openFull('${p.id}')">
                <p>${p.text.substring(0, 100)}${p.text.length > 100 ? '...' : ''}</p>
                <div class="meta">
                    <span>— ${p.author}</span>
                    <span>${new Date(p.date).toLocaleDateString()}</span>
                </div>
                <div class="actions">
                    <span onclick="event.stopPropagation(); like('${p.id}', ${p.likes || 0})">
                        ❤️ ${p.likes || 0}
                    </span>
                    ${IS_OWNER ? `<span onclick="event.stopPropagation(); deletePoem('${p.id}')">🗑️</span>` : ``}
                </div>
            </div>`;
    });
}

// --- 4. ACTIONS ---
function savePoem() {
    const t = document.getElementById("title").value;
    const c = document.getElementById("content").value;
    const a = document.getElementById("author").value || "Anonymous";

    if(!c) return alert("Please enter some content.");

    db.ref("poems").push({
        title: t,
        text: c,
        author: a,
        date: Date.now(),
        likes: 0
    }).then(() => {
        closeEditor();
        document.getElementById("title").value = "";
        document.getElementById("content").value = "";
    }).catch(e => alert("Permission denied. Check your Firebase Rules!"));
}

function deletePoem(id) {
    if(confirm("Are you sure you want to delete this?")) {
        db.ref("poems/" + id).remove();
    }
}

function like(id, current) {
    db.ref("poems/" + id).update({ likes: current + 1 });
}

function openFull(id) {
    const p = poemsArray.find(x => x.id === id);
    if(!p) return;
    document.getElementById("full").style.display = "block";
    document.getElementById("list").style.display = "none";
    document.getElementById("fullText").innerHTML = `
        <h3 style="font-family:'Playfair Display'">${p.title || 'Untitled'}</h3>
        <p style="white-space: pre-wrap; line-height:1.8;">${p.text}</p>
        <div class="meta">
            <span>— ${p.author}</span>
            <span>${new Date(p.date).toLocaleDateString()}</span>
        </div>`;
}

function closeFull() {
    document.getElementById("full").style.display = "none";
    document.getElementById("list").style.display = "block";
}

function openEditor() { document.getElementById("editor").style.display = "flex"; }
function closeEditor() { document.getElementById("editor").style.display = "none"; }
</script>
</body>
</html>
