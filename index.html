<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Public Diary</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{ --bg:#f3e4bf; --app:#faf6ed; --card:#f0ebe1; --text:#4b463f; --accent:#c9b37e; }
body{ margin:0; background:var(--bg); font-family:'Inter',sans-serif; }

.app{ max-width:420px; margin:auto; min-height:100vh; background:var(--app); border-radius:28px; overflow:hidden; }

header{ padding:25px; text-align:center; font-family:'Playfair Display'; font-size:24px; cursor:pointer; }

.card{ background:var(--card); margin:14px; padding:18px; border-radius:20px; cursor:pointer; }
.meta{ font-size:12px; opacity:.6; display:flex; justify-content:space-between; margin-top:10px; }
.actions{ display:flex; justify-content:space-between; margin-top:10px; }

.add{ position:fixed; bottom:30px; right:20px; width:56px; height:56px; border-radius:50%; background:var(--accent); color:white; font-size:32px; display:none; align-items:center; justify-content:center; cursor:pointer; }

.modal{ position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; }
.box{ background:white; width:85%; padding:20px; border-radius:20px; }

input, textarea{ width:100%; margin-bottom:10px; padding:10px; border-radius:10px; border:1px solid #ccc; }
button{ width:100%; padding:12px; background:var(--accent); border:none; color:white; border-radius:10px; cursor:pointer; }
</style>
</head>

<body>

<div class="app">

<header ondblclick="adminLogin()"><b>ಊರ್ಮನಿಯರ್ ಹಾಡ್</b></header>

<div id="list"></div>

<!-- ✅ MOVE HERE -->
<div id="reader" style="display:none; padding:20px;">

  <div onclick="closeReader()" style="cursor:pointer; margin-bottom:15px; opacity:0.6;">
    ← Back
  </div>

  <h2 id="readTitle" style="font-family:'Playfair Display'; margin-bottom:10px;"></h2>

  <div id="readMeta" style="font-size:12px; opacity:0.6; margin-bottom:20px;"></div>

  <div id="readContent" style="line-height:1.8; font-size:18px; white-space:pre-wrap;"></div>

</div>

<div class="add" id="addBtn" onclick="openEditor()">＋</div>

<div class="modal" id="editor">
  <div class="box">
    <h3>New Entry</h3>
    <input id="title" placeholder="Title">
    <textarea id="content" placeholder="Write..."></textarea>
    <input id="author" placeholder="Your Name">
    <button onclick="savePoem()">Publish Entry</button>
  </div>
</div>

</div>

<div id="reader" style="display:none; padding:20px;">

  <div onclick="closeReader()" style="cursor:pointer; margin-bottom:15px; opacity:0.6;">
    ← Back
  </div>

  <h2 id="readTitle" style="font-family:'Playfair Display'; margin-bottom:10px;"></h2>

  <div id="readMeta" style="font-size:12px; opacity:0.6; margin-bottom:20px;"></div>

  <div id="readContent" style="line-height:1.8; font-size:18px; white-space:pre-wrap;"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCNJX5mEmwBmd0uwh_Rjz8GyXczU3f6aA8",
  authDomain: "public-diary-dd4bc.firebaseapp.com",
  databaseURL:"https://public-diary-dd4bc-default-rtdb.firebaseio.com/",
  projectId: "public-diary-dd4bc",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let IS_OWNER = false;
const PASSWORD = "1234";

function adminLogin(){
  let pass = prompt("Enter Admin Password");
  if(pass === PASSWORD){
    IS_OWNER = true;
    document.getElementById("addBtn").style.display="flex";
    alert("Admin Mode Enabled");
    render();
  }
}

let poemsArray = [];

// FETCH DATA
db.ref("poems").on("value", snap=>{
  const data = snap.val();

  if(!data){
    document.getElementById("list").innerHTML = "<p style='text-align:center'>No entries</p>";
    return;
  }

  poemsArray = Object.entries(data).map(([id,val])=>({id,...val}));
  poemsArray.sort((a,b)=>b.date-a.date);

  render();
});

// RENDER
function render(){
  const list = document.getElementById("list");

  list.innerHTML = poemsArray.map(p=>`
    <div class="card" onclick="openFull('${p.id}')">
      <p>${(p.text || "").substring(0,100)}...</p>

      <div class="meta">
        <span>${p.author}</span>
        <span>${new Date(p.date).toLocaleDateString()}</span>
      </div>

      <div class="actions">
        <span onclick="like('${p.id}', ${p.likes||0}); event.stopPropagation();">❤️ ${p.likes || 0}</span>
        ${IS_OWNER ? `<span onclick="deletePoem('${p.id}'); event.stopPropagation();">🗑️</span>` : ""}
      </div>
    </div>
  `).join("");
}

// SAVE ENTRY
function savePoem(){
  const t = title.value;
  const c = content.value;
  const a = author.value || "Anonymous";

  if(!c.trim()){
    alert("Write something!");
    return;
  }

  db.ref("poems").push({
    title:t,
    text:c,
    author:a,
    date:Date.now(),
    likes:0
  })
  .then(()=>{
    alert("Published!");
    closeEditor();
    title.value=""; content.value=""; author.value="";
  })
  .catch(err=>{
    alert("Error: "+err.message);
  });
}

// DELETE
function deletePoem(id){
  event.stopPropagation(); // VERY IMPORTANT (prevents card click)

  if(!confirm("Delete this entry permanently?")) return;

  db.ref("poems/" + id).remove()
  .then(() => {
      alert("✅ Deleted successfully");

      // remove instantly from UI (no wait for Firebase)
      poemsArray = poemsArray.filter(p => p.id !== id);
      render();
  })
  .catch((err) => {
      console.error(err);
      alert("❌ Delete failed: " + err.message);
  });
}

// LIKE (with local protection)
function like(id, current){
  event.stopPropagation();

  let liked = JSON.parse(localStorage.getItem("likedPosts") || "[]");

  // 🚫 Already liked
  if(liked.includes(id)){
    alert("You already liked this ❤️");
    return;
  }

  // ✅ Update Firebase
  db.ref("poems/" + id).update({
    likes: (current || 0) + 1
  })
  .then(() => {
      // Save locally
      liked.push(id);
      localStorage.setItem("likedPosts", JSON.stringify(liked));

      // Update UI instantly
      const post = poemsArray.find(p => p.id === id);
      if(post){
        post.likes = (post.likes || 0) + 1;
      }

      render();
  })
  .catch(err => {
      console.error(err);
      alert("Error liking post");
  });
}

// UI
function openEditor(){ editor.style.display="flex"; }
function closeEditor(){ editor.style.display="none"; }

function closeReader(){
  document.getElementById("reader").style.display = "none";
  document.getElementById("list").style.display = "block";
}

// FULL VIEW
function openFull(id){
  const p = poemsArray.find(x=>x.id===id);
  if(!p) return;

  document.getElementById("list").style.display = "none";
  document.getElementById("reader").style.display = "block";

  document.getElementById("readTitle").innerText = p.title || "Untitled";
  document.getElementById("readMeta").innerText =
    "By " + p.author + " • " + new Date(p.date).toLocaleDateString();

  document.getElementById("readContent").innerText = p.text;

  window.scrollTo(0,0);
}
</script>

</body>
</html>
